name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm tearing down ALL Natours infra (VPC, EC2, security group, Route 53 records). Cannot be undone.'
        required: true

jobs:
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    defaults:
      run:
        working-directory: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1
      TF_VAR_my_ip: ${{ secrets.MY_IP }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive public key from EC2_SSH_KEY
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          PUBLIC_KEY=$(ssh-keygen -y -f /tmp/ssh_key)
          rm /tmp/ssh_key
          echo "TF_VAR_ec2_public_key=$PUBLIC_KEY" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      - name: Done
        run: |
          echo "─────────────────────────────────────────────────────"
          echo "All Natours infra has been destroyed."
          echo ""
          echo "What's still there (intentionally preserved):"
          echo "  • S3 bucket  nitinkdevs-tf-state          (stores state — bootstrap infra)"
          echo "  • DynamoDB   terraform-state-lock         (state lock — bootstrap infra)"
          echo "  • Route 53   nitinkdevs.com hosted zone   (your root domain)"
          echo ""
          echo "To nuke the bootstrap too, delete the bucket and table"
          echo "manually in the AWS console after this run."
          echo "─────────────────────────────────────────────────────"
