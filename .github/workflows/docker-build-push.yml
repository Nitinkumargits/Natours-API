name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: nitinkdocker18/natoursapi
  DOMAIN: nitinkdevs.com
  EMAIL: nitinkwork18@gmail.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get next version
        id: version
        run: |
          TAGS=$(curl -s https://hub.docker.com/v2/repositories/nitinkdocker18/natoursapi/tags?page_size=100 | jq -r '.results[].name')

          LATEST_VERSION=$(echo "$TAGS" \
            | grep -E '^v[0-9]+$' \
            | sed 's/v//' \
            | sort -n \
            | tail -1)

          if [ -z "$LATEST_VERSION" ]; then
            NEXT_VERSION=1
          else
            NEXT_VERSION=$((LATEST_VERSION + 1))
          fi

          VERSION="v$NEXT_VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Generated version: $VERSION"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Print image info
        run: |
          echo "✅ Successfully pushed:"
          echo "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          echo "${{ env.IMAGE_NAME }}:latest"
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    permissions:
      contents: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_my_ip: ${{ secrets.MY_IP }}
      TF_VAR_ec2_public_key: ${{ secrets.EC2_PUBLIC_KEY }}

    outputs:
      ec2_ip: ${{ steps.ip.outputs.ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Import existing resources into state
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name nitinkdevs.com \
            --query "HostedZones[0].Id" \
            --output text | sed 's|/hostedzone/||')
          terraform import aws_key_pair.natours-key kp_natoursapi.pem || true
          terraform import aws_route53_record.natours-a "${ZONE_ID}_nitinkdevs.com_A" || true
          terraform import aws_route53_record.natours-www "${ZONE_ID}_www.nitinkdevs.com_A" || true

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Output EC2 IP
        id: ip
        run: echo "ip=$(terraform output ec2_public_ip)" >> $GITHUB_OUTPUT

      - name: Commit state to GitHub
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform/terraform.tfstate
          git diff --staged --quiet || git commit -m "chore: update terraform state [skip ci]"
          git push

  deploy:
    needs: [terraform, build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Nginx config to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ needs.terraform.outputs.ec2_ip || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: nginx/natours.conf
          target: /home/${{ secrets.EC2_USER }}/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ needs.terraform.outputs.ec2_ip || secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE_TAG=${{ needs.build-and-push.outputs.image_version }}
            DOMAIN="${{ env.DOMAIN }}"
            EMAIL="${{ env.EMAIL }}"
            IMAGE="${{ env.IMAGE_NAME }}"

            # ── 1. Install Nginx and Certbot if missing ──────────────────
            if ! command -v nginx &>/dev/null; then
              echo "📦 Installing Nginx..."
              sudo apt-get update -y
              sudo apt-get install -y nginx certbot python3-certbot-nginx
              sudo systemctl enable nginx
              sudo systemctl start nginx
            fi

            # ── 2. Install Docker if missing ─────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "📦 Installing Docker..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
            fi

            # ── 3. Ensure env file directory exists ──────────────────────
            sudo mkdir -p /opt/natours

            # ── 4. Sync Nginx config ─────────────────────────────────────
            echo "🔧 Updating Nginx config..."
            sudo cp ~/nginx/natours.conf /etc/nginx/sites-available/natours
            sudo ln -sf /etc/nginx/sites-available/natours /etc/nginx/sites-enabled/natours
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t

            # ── 5. Obtain SSL cert (only on first deploy) ─────────────────
            if [ ! -d /etc/letsencrypt/live/$DOMAIN ]; then
              echo "🔒 Obtaining SSL certificate..."
              if sudo certbot --nginx \
                --non-interactive \
                --agree-tos \
                --email "$EMAIL" \
                -d "$DOMAIN" \
                -d "www.$DOMAIN"; then
                echo "✅ SSL certificate obtained successfully."
              else
                echo "⚠️  Certbot failed — DNS not ready yet. App will run on HTTP."
                echo "⚠️  Push again once DNS is propagated to get SSL."
                sudo systemctl reload nginx
              fi
            else
              echo "✅ SSL certificate already exists, skipping Certbot."
              sudo systemctl reload nginx
            fi

            # ── 6. Pull and run Docker container ─────────────────────────
            echo "🐳 Pulling image: $IMAGE_TAG"
            sudo docker pull $IMAGE:$IMAGE_TAG

            echo "🛑 Stopping old container..."
            sudo docker stop app || true
            sudo docker rm app || true

            echo "🚀 Starting new container..."
            sudo docker run -d \
              --name app \
              --restart always \
              -p 127.0.0.1:3000:3000 \
              --env-file /opt/natours/prod.env \
              $IMAGE:$IMAGE_TAG

            echo "⏳ Waiting for app to start..."
            sleep 15

            # ── 7. Health check ───────────────────────────────────────────
            echo "🏥 Running health check..."
            curl -f http://localhost:3000 || exit 1

            echo "🧹 Cleaning unused images..."
            sudo docker image prune -af

            echo "✅ Deployment successful! Live at https://$DOMAIN"
