name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: nitinkdocker18/natoursapi
  DOMAIN: nitinkdevs.com
  EMAIL: nitinkwork18@gmail.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get next version
        id: version
        run: |
          TAGS=$(curl -s https://hub.docker.com/v2/repositories/nitinkdocker18/natoursapi/tags?page_size=100 | jq -r '.results[].name')

          LATEST_VERSION=$(echo "$TAGS" \
            | grep -E '^v[0-9]+$' \
            | sed 's/v//' \
            | sort -n \
            | tail -1)

          if [ -z "$LATEST_VERSION" ]; then
            NEXT_VERSION=1
          else
            NEXT_VERSION=$((LATEST_VERSION + 1))
          fi

          VERSION="v$NEXT_VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Generated version: $VERSION"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Print image info
        run: |
          echo "✅ Successfully pushed:"
          echo "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          echo "${{ env.IMAGE_NAME }}:latest"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Nginx config to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: nginx/natours.conf
          target: /home/${{ secrets.EC2_USER }}/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE_TAG=${{ needs.build-and-push.outputs.image_version }}
            DOMAIN="${{ env.DOMAIN }}"
            EMAIL="${{ env.EMAIL }}"
            IMAGE="${{ env.IMAGE_NAME }}"

            # ── 1. Install Nginx and Certbot if missing ──────────────────
            if ! command -v nginx &>/dev/null; then
              echo "📦 Installing Nginx..."
              sudo apt-get update -y
              sudo apt-get install -y nginx certbot python3-certbot-nginx
              sudo systemctl enable nginx
              sudo systemctl start nginx
            fi

            # ── 2. Install Docker if missing ─────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "📦 Installing Docker..."
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker $USER
            fi

            # ── 3. Ensure env file directory exists ──────────────────────
            sudo mkdir -p /opt/natours

            # ── 4. Sync Nginx config ─────────────────────────────────────
            echo "🔧 Updating Nginx config..."
            sudo cp ~/nginx/natours.conf /etc/nginx/sites-available/natours
            sudo ln -sf /etc/nginx/sites-available/natours /etc/nginx/sites-enabled/natours
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t

            # ── 5. Obtain SSL cert (only on first deploy) ─────────────────
            if [ ! -d /etc/letsencrypt/live/$DOMAIN ]; then
              echo "🔒 Obtaining SSL certificate..."
              if sudo certbot --nginx \
                --non-interactive \
                --agree-tos \
                --email "$EMAIL" \
                -d "$DOMAIN" \
                -d "www.$DOMAIN"; then
                echo "✅ SSL certificate obtained successfully."
              else
                echo "⚠️  Certbot failed — DNS not ready yet. App will run on HTTP."
                echo "⚠️  Push again once DNS is propagated to get SSL."
                sudo systemctl reload nginx
              fi
            else
              echo "✅ SSL certificate already exists, skipping Certbot."
              sudo systemctl reload nginx
            fi

            # ── 6. Pull and run Docker container ─────────────────────────
            echo "🐳 Pulling image: $IMAGE_TAG"
            sudo docker pull $IMAGE:$IMAGE_TAG

            echo "🛑 Stopping old container..."
            sudo docker stop app || true
            sudo docker rm app || true

            echo "🚀 Starting new container..."
            sudo docker run -d \
              --name app \
              --restart always \
              -p 127.0.0.1:3000:3000 \
              --env-file /opt/natours/prod.env \
              $IMAGE:$IMAGE_TAG

            echo "⏳ Waiting for app to start..."
            sleep 15

            # ── 7. Health check ───────────────────────────────────────────
            echo "🏥 Running health check..."
            curl -f http://localhost:3000 || exit 1

            echo "🧹 Cleaning unused images..."
            sudo docker image prune -af

            echo "✅ Deployment successful! Live at https://$DOMAIN"
