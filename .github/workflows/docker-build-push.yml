name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag_type:
        description: 'Tag type: version (v1, v2, etc) or custom'
        required: true
        default: 'version'
        type: choice
        options:
          - version
          - custom
      version_number:
        description: 'Major version number (e.g., 1 for v1, 2 for v2) - only for version type'
        required: false
        default: ''
      custom_tag:
        description: 'Custom tag name (e.g., v1.0.0, release-1) - only for custom type'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: nitinkdocker18/natoursapi

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag_name }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag_name }}
          docker tag ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag_name }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:latest

          # Push semantic version tags if available
          if [ -n "${{ steps.meta.outputs.version_major }}" ]; then
            docker tag ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag_name }} ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_major }}
            docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_major }}

            docker tag ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag_name }} ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_minor }}
            docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_minor }}

            docker tag ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag_name }} ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_patch }}
            docker push ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_patch }}
          fi

      - name: Print deployment info
        run: |
          echo "✅ Docker image successfully built and pushed"
          echo "📦 Main tag: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag_name }}"
          echo "📦 Also tagged as: ${{ env.IMAGE_NAME }}:latest"
          if [ -n "${{ steps.meta.outputs.version_major }}" ]; then
            echo "📦 Semantic versions:"
            echo "   - ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_major }}"
            echo "   - ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_minor }}"
            echo "   - ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version_patch }}"
          fi
