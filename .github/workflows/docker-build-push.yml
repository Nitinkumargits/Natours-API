name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: nitinkdocker18/natoursapi
  DOMAIN: natours.nitinkdevs.com
  EMAIL: nitinkwork18@gmail.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get next version
        id: version
        run: |
          TAGS=$(curl -s https://hub.docker.com/v2/repositories/nitinkdocker18/natoursapi/tags?page_size=100 | jq -r '.results[].name')

          LATEST_VERSION=$(echo "$TAGS" \
            | grep -E '^v[0-9]+$' \
            | sed 's/v//' \
            | sort -n \
            | tail -1)

          if [ -z "$LATEST_VERSION" ]; then
            NEXT_VERSION=1
          else
            NEXT_VERSION=$((LATEST_VERSION + 1))
          fi

          VERSION="v$NEXT_VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Generated version: $VERSION"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Print image info
        run: |
          echo "✅ Successfully pushed:"
          echo "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          echo "${{ env.IMAGE_NAME }}:latest"
  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest

    env:
      HOST: ${{ secrets.EC2_HOST }}
      INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      INSTANCE_AZ: ${{ secrets.EC2_INSTANCE_AZ }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_version }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ap-south-1

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          echo "Key fingerprint: $(ssh-keygen -lf ~/.ssh/deploy_key)"

      - name: Wait for SSH to be reachable
        run: |
          for i in {1..30}; do
            if nc -z -w 5 "$HOST" 22; then
              echo "SSH port reachable"
              break
            fi
            echo "Waiting for SSH... ($i/30)"
            sleep 10
          done
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Push key via EC2 Instance Connect
        if: env.INSTANCE_ID != ''
        run: |
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id "$INSTANCE_ID" \
            --availability-zone "$INSTANCE_AZ" \
            --instance-os-user ubuntu \
            --ssh-public-key "file://$HOME/.ssh/deploy_key.pub"
          echo "Key pushed via EC2 Instance Connect (valid for 60s)"

      - name: Deploy to EC2
        env:
          PROD_ENV_B64: ${{ secrets.PROD_ENV_B64 }}
        run: |
          echo "Encoded env secret length: ${#PROD_ENV_B64} chars"
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@"$HOST" \
            "PROD_ENV_B64='$PROD_ENV_B64' bash -s" << 'ENDSSH'
            set -e

            IMAGE_TAG="${{ env.IMAGE_TAG }}"
            IMAGE="${{ env.IMAGE_NAME }}"
            DOMAIN="${{ env.DOMAIN }}"
            EMAIL="${{ env.EMAIL }}"

            # ── 1. Install Nginx and Certbot if missing ──────────────────
            if ! command -v nginx &>/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y nginx certbot python3-certbot-nginx
              sudo systemctl enable nginx
              sudo systemctl start nginx
            fi

            # ── 2. Install Docker if missing ─────────────────────────────
            if ! command -v docker &>/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ubuntu
            fi

            # ── 3. Write env file from GitHub secret ─────────────────────
            sudo mkdir -p /opt/natours
            DECODED=$(echo "${PROD_ENV_B64}" | tr -d ' \n\r\t' | base64 -d 2>/dev/null || echo "")
            if [ -z "$DECODED" ] || [ "$(echo "$DECODED" | wc -l)" -lt 3 ]; then
              echo "WARNING: PROD_ENV secret is empty or too short. Keeping existing /opt/natours/prod.env"
              if [ ! -f /opt/natours/prod.env ]; then
                echo "ERROR: No existing prod.env and secret is empty. Aborting."
                exit 1
              fi
            else
              echo "$DECODED" | sudo tee /opt/natours/prod.env > /dev/null
              sudo chmod 600 /opt/natours/prod.env
              echo "Env file written, $(sudo wc -l < /opt/natours/prod.env) lines"
            fi

            # ── 3b. Ensure env file directory exists ─────────────────────
            sudo mkdir -p /opt/natours

            # ── 4. Write Nginx config ────────────────────────────────────
            sudo tee /etc/nginx/sites-available/natours > /dev/null << 'NGINXCONF'
          server {
              listen 80;
              server_name natours.nitinkdevs.com www.natours.nitinkdevs.com;

              location / {
                  proxy_pass         http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection 'upgrade';
                  proxy_set_header   Host $host;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
              }
          }
          NGINXCONF
            sudo ln -sf /etc/nginx/sites-available/natours /etc/nginx/sites-enabled/natours
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t

            # ── 5. Obtain SSL cert (only on first deploy) ─────────────────
            if [ ! -d /etc/letsencrypt/live/$DOMAIN ]; then
              if sudo certbot --nginx \
                --non-interactive \
                --agree-tos \
                --email "$EMAIL" \
                -d "$DOMAIN" \
                -d "www.$DOMAIN"; then
                echo "SSL certificate obtained."
              else
                echo "Certbot failed — DNS not ready yet. Continuing on HTTP."
                sudo systemctl reload nginx
              fi
            else
              sudo systemctl reload nginx
            fi

            # ── 6. Pull and run Docker container ─────────────────────────
            sudo docker pull $IMAGE:$IMAGE_TAG
            sudo docker stop app || true
            sudo docker rm app || true
            sudo docker run -d \
              --name app \
              --restart always \
              -p 127.0.0.1:3000:3000 \
              --env-file /opt/natours/prod.env \
              $IMAGE:$IMAGE_TAG

            # ── 7. Health check with retry ────────────────────────────────
            echo "Waiting for app to be ready..."
            for i in {1..30}; do
              if curl -fs http://localhost:3000 > /dev/null; then
                echo "App is healthy"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Health check failed after 60s. Container logs:"
                sudo docker ps -a
                sudo docker logs app --tail 100
                echo "Container env (first 5 lines, no secrets):"
                sudo head -5 /opt/natours/prod.env | sed 's/=.*/=***/'
                exit 1
              fi
              sleep 2
            done
            sudo docker image prune -af
            echo "Deployment successful! Live at https://$DOMAIN"
          ENDSSH
