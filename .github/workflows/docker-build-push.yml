name: Build and Deploy

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: nitinkdocker18/natoursapi

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    outputs:
      image_version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get next version
        id: version
        run: |
          TAGS=$(curl -s https://hub.docker.com/v2/repositories/nitinkdocker18/natoursapi/tags?page_size=100 | jq -r '.results[].name')

          LATEST_VERSION=$(echo "$TAGS" \
            | grep -E '^v[0-9]+$' \
            | sed 's/v//' \
            | sort -n \
            | tail -1)

          if [ -z "$LATEST_VERSION" ]; then
            NEXT_VERSION=1
          else
            NEXT_VERSION=$((LATEST_VERSION + 1))
          fi

          VERSION="v$NEXT_VERSION"

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "Generated version: $VERSION"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Print image info
        run: |
          echo "✅ Successfully pushed:"
          echo "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          echo "${{ env.IMAGE_NAME }}:latest"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE_TAG=${{ needs.build-and-push.outputs.image_version }}

            echo "🐳 Pulling image: $IMAGE_TAG"

            docker pull ${{ env.IMAGE_NAME }}:$IMAGE_TAG

            echo "🛑 Stopping old container..."
            docker stop app || true
            docker rm app || true

            echo "🚀 Starting new container..."

            docker run -d \
              --name app \
              --restart always \
              -p 3000:3000 \
              --env-file /opt/natours/prod.env \
              ${{ env.IMAGE_NAME }}:$IMAGE_TAG

            echo "⏳ Waiting for app..."
            sleep 15

            echo "🏥 Running health check..."
            curl -f http://localhost:3000 || exit 1

            echo "🧹 Cleaning unused images..."
            docker image prune -af

            echo "✅ Deployment successful!"

      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Successfully deployed version:"
          echo "${{ needs.build-and-push.outputs.image_version }}"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed"
