name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: nitinkdocker18/natoursapi

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get next version
        id: version
        run: |
          # Fetch tags from Docker Hub
          TAGS=$(curl -s https://hub.docker.com/v2/repositories/nitinkdocker18/natoursapi/tags?page_size=100 | jq -r '.results[].name')

          # Extract version numbers like v1, v2, v3
          LATEST_VERSION=$(echo "$TAGS" \
            | grep -E '^v[0-9]+$' \
            | sed 's/v//' \
            | sort -n \
            | tail -1)

          # Default to v1 if no tags exist
          if [ -z "$LATEST_VERSION" ]; then
            NEXT_VERSION=1
          else
            NEXT_VERSION=$((LATEST_VERSION + 1))
          fi

          echo "VERSION=v$NEXT_VERSION" >> $GITHUB_ENV
          echo "Generated version: v$NEXT_VERSION"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Print image info
        run: |
          echo "✅ Successfully pushed:"
          echo "${{ env.IMAGE_NAME }}:${{ env.VERSION }}"
          echo "${{ env.IMAGE_NAME }}:latest"
